name: Release Binaries

on:
    push:
        tags:
            - "v*"
    workflow_dispatch:

permissions:
    contents: write

env:
    BINARY_NAME: surrealkit

jobs:
    build:
        name: Build ${{ matrix.target }}
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: ubuntu-latest
                      target: x86_64-unknown-linux-gnu
                    - os: ubuntu-latest
                      target: x86_64-unknown-linux-musl
                    - os: ubuntu-24.04-arm
                      target: aarch64-unknown-linux-gnu
                    - os: ubuntu-24.04-arm
                      target: aarch64-unknown-linux-musl
                    - os: macos-26
                      target: aarch64-apple-darwin
                    # Cross-compiled from the Apple Silicon runner
                    - os: macos-26
                      target: x86_64-apple-darwin
                    - os: windows-latest
                      target: x86_64-pc-windows-msvc

        steps:
            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
              with:
                  toolchain: 1.94.0
                  targets: ${{ matrix.target }}
                  components: clippy, rustfmt

            - name: Install musl toolchain
              if: endsWith(matrix.target, '-musl')
              run: sudo apt-get update && sudo apt-get install -y musl-tools

            - name: Cache Rust artifacts
              uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4

            - name: Build release binary
              run: cargo build --manifest-path crates/surrealkit/Cargo.toml --locked --release --target ${{ matrix.target }}

            - name: Package archive (unix)
              if: runner.os != 'Windows'
              id: package_unix
              shell: bash
              run: |
                  set -euo pipefail
                  TAG="${GITHUB_REF_NAME:-dev}"
                  BIN="target/${{ matrix.target }}/release/${BINARY_NAME}"
                  test -f "$BIN" || (echo "Missing binary: $BIN" && ls -la "target/${{ matrix.target }}/release" && exit 1)
                  ARCHIVE="${BINARY_NAME}-${TAG}-${{ matrix.target }}.tar.gz"
                  tar -C "target/${{ matrix.target }}/release" -czf "${ARCHIVE}" "${BINARY_NAME}"
                  shasum -a 256 "${ARCHIVE}" > "${ARCHIVE}.sha256"
                  echo "archive=${ARCHIVE}" >> "${GITHUB_OUTPUT}"
                  echo "checksum=${ARCHIVE}.sha256" >> "${GITHUB_OUTPUT}"

            - name: Package archive (windows)
              if: runner.os == 'Windows'
              id: package_windows
              shell: pwsh
              run: |
                  $tag = if ("${{ github.ref_name }}") { "${{ github.ref_name }}" } else { "dev" }
                  $archive = "${env:BINARY_NAME}-$tag-${{ matrix.target }}.zip"
                  Compress-Archive -Path "target/${{ matrix.target }}/release/${env:BINARY_NAME}.exe" -DestinationPath $archive
                  $hash = (Get-FileHash -Algorithm SHA256 -Path $archive).Hash.ToLower()
                  # Match the `shasum -a 256` format: "<hash>  <filename>\n"
                  "$hash  $archive`n" | Out-File -FilePath "$archive.sha256" -Encoding ascii -NoNewline
                  Add-Content -Path $env:GITHUB_OUTPUT -Value "archive=$archive"
                  Add-Content -Path $env:GITHUB_OUTPUT -Value "checksum=$archive.sha256"

            - name: Upload artifact (unix)
              if: runner.os != 'Windows'
              uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
              with:
                  name: ${{ matrix.target }}
                  path: |
                      ${{ steps.package_unix.outputs.archive }}
                      ${{ steps.package_unix.outputs.checksum }}
                  if-no-files-found: error

            - name: Upload artifact (windows)
              if: runner.os == 'Windows'
              uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
              with:
                  name: ${{ matrix.target }}
                  path: |
                      ${{ steps.package_windows.outputs.archive }}
                      ${{ steps.package_windows.outputs.checksum }}
                  if-no-files-found: error

    release:
        name: Publish GitHub Release Assets
        if: startsWith(github.ref, 'refs/tags/')
        needs: build
        runs-on: ubuntu-latest
        steps:
            - name: Download all build artifacts
              uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
              with:
                  path: dist
                  merge-multiple: true

            - name: Upload assets to release
              uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe
              with:
                  files: dist/*
                  generate_release_notes: true
                  fail_on_unmatched_files: true
