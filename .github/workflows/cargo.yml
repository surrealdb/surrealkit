name: CI

on:
    push:
        branches:
            - "**"
        tags:
            - "v*"
    pull_request:
    workflow_dispatch:

permissions:
    contents: read

jobs:
    publish:
        name: Lint, test, and publish
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
              with:
                  toolchain: 1.94.0
                  components: clippy, rustfmt

            - name: Lint
              run: cargo clippy

            - name: Format
              run: cargo fmt --check

            - name: Test crate
              run: cargo test --manifest-path crates/surrealkit/Cargo.toml --all-features --locked

            # Publishes are idempotent: a version already on crates.io is
            # skipped (not an error), so a partially-failed release can be
            # safely re-run. Any other publish failure still fails the job.
            - name: Publish surrealkit-macros
              if: startsWith(github.ref, 'refs/tags/')
              run: |
                  if cargo publish --manifest-path crates/surrealkit-macros/Cargo.toml --locked 2>publish.err; then
                      cat publish.err
                  elif grep -qi "already \(exists\|uploaded\)" publish.err; then
                      cat publish.err
                      echo "surrealkit-macros version already on crates.io; skipping."
                  else
                      cat publish.err
                      exit 1
                  fi
              env:
                  CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

            - name: Publish surrealkit
              if: startsWith(github.ref, 'refs/tags/')
              run: |
                  if cargo publish --manifest-path crates/surrealkit/Cargo.toml --locked 2>publish.err; then
                      cat publish.err
                  elif grep -qi "already \(exists\|uploaded\)" publish.err; then
                      cat publish.err
                      echo "surrealkit version already on crates.io; skipping."
                  else
                      cat publish.err
                      exit 1
                  fi
              env:
                  CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
