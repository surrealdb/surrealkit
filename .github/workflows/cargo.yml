name: CI

on:
    push:
        branches:
            - "**"
        tags:
            - "v*"
    pull_request:
    workflow_dispatch:

permissions:
    contents: read

jobs:
    publish:
        name: Lint, test, and publish
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
              with:
                  toolchain: 1.94.0
                  components: clippy, rustfmt

            - name: Lint
              run: cargo clippy

            - name: Format
              run: cargo fmt --check

            - name: Test crate
              run: cargo test --manifest-path crates/surrealkit/Cargo.toml --all-features --locked

            - name: Publish surrealkit-macros
              if: startsWith(github.ref, 'refs/tags/')
              run: cargo publish --manifest-path crates/surrealkit-macros/Cargo.toml --locked
              env:
                  CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

            - name: Publish surrealkit
              if: startsWith(github.ref, 'refs/tags/')
              run: cargo publish --manifest-path crates/surrealkit/Cargo.toml --locked
              env:
                  CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
